name: Deploy Plataforma Educativa Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar aplicación
        run: ./mvnw clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa-cloud:latest .

      - name: Publicar imagen Docker
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa-cloud:latest

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Desplegar en EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << EOF

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa-cloud:latest

          docker stop plataforma-educativa-cloud || true
          docker rm plataforma-educativa-cloud || true

          docker run -d \
            --name plataforma-educativa-cloud \
            -p 8080:8080 \
            -e ORACLE_DB_URL="${{ secrets.ORACLE_DB_URL }}" \
            -e ORACLE_DB_USERNAME="${{ secrets.ORACLE_DB_USERNAME }}" \
            -e ORACLE_DB_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa-cloud:latest

          EOF